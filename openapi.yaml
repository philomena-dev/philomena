openapi: 3.1.1
info:
  title: Philomena API
  description: |
    JSON API for major site functionality of the Philomena imageboard software
    (as used by Derpibooru and others). The API can be freely used by anyone
    wanting to produce tools for the site or other web applications that use
    the data provided within the site.

    Note that if you are looking to *continuously scrape the entire website*,
    several boorus offer nightly database dumps instead. Consider if these suit
    your needs first, then rely on the API if they do not.

    **Data Dumps:**

    - [Derpibooru](https://derpibooru.org/pages/data_dumps)
    - [Furbooru](https://furbooru.org/pages/data_dumps)
    - [Tantabus](https://tantabus.ai/pages/data_dumps)

    ## Licensing

    Anyone may use the API. Users making abusively high numbers of requests or
    excessively expensive requests will be asked to stop, and banned if they
    do not. Your application must properly cache, and respect server-side
    cache expiry times. Your client must gracefully back off if requests fail,
    preferably exponentially or fatally.

    If images are used, the artist must always be credited (if provided) and
    the original source URL must be displayed alongside the image, either in
    textual form or as a link. A link to the site's image page is optional but
    recommended. The `https:` protocol must be specified on all URLs.

    ## Rate Limits

    To prevent site abuse, Derpibooru has rate limits in place:

    - **Normal requests:** 30 requests per 5 seconds
    - **API search path (`/api/v1/json/search*`):** 20 requests per 10 seconds

    Additionally, the site employs middleware to monitor its state and issue
    anti-bot challenge pages in case the overall site request rate exceeds
    normal values. This is independent of your application's actions, and you
    may be challenged even if your IP has never sent any requests to the site
    before.

    **In case of a middleware challenge, the site will respond with a `501`
    HTTP error code and a response content type of `text/html`.** Upon
    receiving this error, your API client must back off and not send any
    requests from the same IP for at least 5 seconds.

    **If your application continues to send requests after receiving the
    challenge page, it will be blocked for at least 15 minutes, and the server
    will respond with a `500` HTTP error code and an empty response body.**
    Any requests sent from the same IP before the 15 minute blocking period
    expires will reset the timer back to 15 minutes. Make sure your
    application completely backs off for at least 15 minutes upon receiving
    such an error.

    ## Authentication

    Most endpoints are usable anonymously. Passing a user API key via the `key`
    query parameter authenticates the request, which enables user-specific
    results (interactions, user filters, watched images) and is required for
    image uploads. You can find your authentication token in your account
    settings.

    ## Pagination

    List endpoints accept `page` and `per_page` query parameters and return a
    `total` count of matching records alongside the page of results.

    ## Filters

    Endpoints that return images honor the current filter. Anonymous requests
    use the default filter; pass `filter_id` to select another accessible
    filter for the duration of the request.
  version: v1
  license:
    name: GNU Affero General Public License v3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://derpibooru.org/api/v1
    description: Derpibooru, an imageboard focused on My Little Pony Friendship is Magic
  - url: https://furbooru.org/api/v1
    description: Furbooru, an imageboard focused on furry content
  - url: https://tantabus.ai/api/v1
    description: Tantabus, an imageboard for MLP AI-generated content

security:
  - {}
  - ApiKey: []

tags:
  - name: Images
    description: Individual images and image uploads
  - name: Search
    description: Query-string based search over site content
  - name: Tags
    description: Tag details
  - name: Comments
    description: Image comments
  - name: Posts
    description: Forum posts
  - name: Forums
    description: Forums and topics
  - name: Filters
    description: Content filters
  - name: Profiles
    description: User profiles
  - name: Oembed
    description: oEmbed provider endpoint
  - name: RSS
    description: RSS feeds

paths:
  /json/images/{id}:
    get:
      tags: [Images]
      summary: Get an image by ID
      operationId: getImage
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric image ID.
          schema:
            type: integer
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/FilterId'
      responses:
        '200':
          description: The requested image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/images:
    post:
      tags: [Images]
      summary: Upload an image
      description: |
        Submits a new image. Both `key` and `url` are required when posting
        via the JSON API; alternatively (on self-hosted instances) the file
        may be sent as a direct multipart upload in `image[image]`.

        You *must* provide the direct link to the image in the `url`
        parameter, and you *must* set the `content-type` header to
        `application/json` for the site to process your request.

        At least three tags must be provided via `image[tag_input]`, including
        a rating tag.

        You are *strongly recommended* to test code using this endpoint using
        a local copy of the website's source code. Abuse of the endpoint
        **will result in a ban**.
      operationId: createImage
      security:
        - ApiKey: []
      parameters:
        - $ref: '#/components/parameters/Key'
        - name: url
          in: query
          required: false
          description: >
            The direct link to the image to fetch. Required unless the file is
            sent as a multipart upload.
          schema:
            type: string
            format: uri
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUploadRequest'
            example:
              image:
                description: >-
                  [bq]Hey there this is a test post![/bq]

                  Descriptions are *weird*.

                  Have a >>0 re-upload :)
                tag_input: >-
                  artist needed, safe, derpy hooves, pegasus, pony, bag,
                  building, chair, letter, mail, muffin, sitting, smiling
                source_url: https://derpibooru.org/images/0
              url: https://derpicdn.net/img/view/2012/1/2/0.jpg
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageUploadMultipartRequest'
      responses:
        '200':
          description: The created image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrors'

  /json/images/featured:
    get:
      tags: [Images]
      summary: Get the current featured image
      operationId: getFeaturedImage
      parameters:
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/FilterId'
      responses:
        '200':
          description: The most recently featured image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/search/images:
    get:
      tags: [Search]
      summary: Search images
      description: |
        Executes the search query given in `q` against images, honoring the
        current filter. See the site's search syntax documentation for the
        query language.
      operationId: searchImages
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/FilterId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/SortField'
        - $ref: '#/components/parameters/SortDirection'
        - name: del
          in: query
          required: false
          description: |
            Moderators only. Pass `1` to include deleted images, `deleted` to
            show only deleted duplicates, or `only` to show only non-deleted
            images.
          schema:
            type: string
            enum: ['1', 'deleted', 'only']
        - name: hidden
          in: query
          required: false
          description: >
            Authenticated users only. Pass `1` to include images the user has
            hidden.
          schema:
            type: string
            enum: ['1']
      responses:
        '200':
          description: Matching images.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/search:
    get:
      tags: [Search]
      summary: Search images (alias)
      description: Convenience alias for `/json/search/images`.
      operationId: searchImagesAlias
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/FilterId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/SortField'
        - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: Matching images.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/search/reverse:
    post:
      tags: [Search]
      summary: Reverse image search
      description: |
        Finds images visually similar to the provided one. The image may be
        given either as a `url` parameter (fetched by the server) or as a
        direct multipart file upload in `image[image]`.
      operationId: reverseImageSearch
      parameters:
        - $ref: '#/components/parameters/Key'
        - name: url
          in: query
          required: false
          description: URL of a remote image to fetch and search for.
          schema:
            type: string
            format: uri
        - name: distance
          in: query
          required: false
          description: >
            Match distance; maximum allowed corner intensity difference.
            Smaller values return closer matches.
          schema:
            type: number
            default: 0.25
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return.
          schema:
            type: integer
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image[image]:
                  type: string
                  format: binary
                  description: The image file to search for.
      responses:
        '200':
          description: >
            Visually similar images. Returns an empty result set if the
            provided image could not be analyzed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchResponse'
        '400':
          description: >
            No image was provided via the `url` parameter or a multipart
            upload.

  /json/search/tags:
    get:
      tags: [Search]
      summary: Search tags
      operationId: searchTags
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Matching tags, sorted by image count descending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSearchResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/search/posts:
    get:
      tags: [Search]
      summary: Search forum posts
      operationId: searchPosts
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Matching posts, sorted by creation time descending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSearchResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/search/comments:
    get:
      tags: [Search]
      summary: Search comments
      operationId: searchComments
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Matching comments, sorted by descending creation time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentSearchResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/search/galleries:
    get:
      tags: [Search]
      summary: Search galleries
      operationId: searchGalleries
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Matching galleries, sorted by creation time descending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GallerySearchResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/search/filters:
    get:
      tags: [Search]
      summary: Search filters
      description: >
        Searches filters visible to the requesting user: public filters,
        system filters, and (when authenticated) the user's own filters.
      operationId: searchFilters
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Matching filters, sorted by name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterListResponse'
        '400':
          $ref: '#/components/responses/SearchError'

  /json/oembed:
    get:
      tags: [Oembed]
      summary: oEmbed lookup for an image URL
      description: Fetches an oEmbed response for the given app link or CDN URL.
      operationId: getOembed
      parameters:
        - name: url
          in: query
          required: true
          description: Site image page URL or CDN image URL to look up.
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: oEmbed photo response for the image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Oembed'
        '404':
          description: No image could be resolved from the URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OembedError'

  /json/tags/{slug}:
    get:
      tags: [Tags]
      summary: Get a tag by slug
      description: >
        Fetches a tag response for the tag slug given by the URL parameter.
        The tag's ID is *not* used.
      operationId: getTag
      parameters:
        - name: slug
          in: path
          required: true
          description: >
            URL-encoded tag slug (e.g. `artist-colon-atryl`).
          schema:
            type: string
      responses:
        '200':
          description: The requested tag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/comments/{id}:
    get:
      tags: [Comments]
      summary: Get a comment by ID
      operationId: getComment
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric comment ID.
          schema:
            type: integer
      responses:
        '200':
          description: The requested comment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '403':
          description: The comment belongs to an image that has been deleted.
        '404':
          $ref: '#/components/responses/NotFound'

  /json/posts/{id}:
    get:
      tags: [Posts]
      summary: Get a forum post by ID
      operationId: getPost
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric post ID.
          schema:
            type: integer
      responses:
        '200':
          description: The requested post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/profiles/{id}:
    get:
      tags: [Profiles]
      summary: Get a user profile by ID
      operationId: getProfile
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric user ID.
          schema:
            type: integer
      responses:
        '200':
          description: The requested user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/filters/{id}:
    get:
      tags: [Filters]
      summary: Get a filter by ID
      description: >
        Returns the filter if it is public, a system filter, or owned by the
        authenticated user.
      operationId: getFilter
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric filter ID.
          schema:
            type: integer
        - $ref: '#/components/parameters/Key'
      responses:
        '200':
          description: The requested filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/filters/user:
    get:
      tags: [Filters]
      summary: List the authenticated user's filters
      operationId: getUserFilters
      security:
        - ApiKey: []
      parameters:
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: The user's filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterListResponse'
        '403':
          description: No valid API key was provided.

  /json/filters/system:
    get:
      tags: [Filters]
      summary: List system filters
      operationId: getSystemFilters
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: The site-provided system filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterListResponse'

  /json/forums:
    get:
      tags: [Forums]
      summary: List forums
      operationId: getForums
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Publicly accessible forums, sorted by name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumListResponse'

  /json/forums/{short_name}:
    get:
      tags: [Forums]
      summary: Get a forum by short name
      operationId: getForum
      parameters:
        - $ref: '#/components/parameters/ForumShortNameAsId'
      responses:
        '200':
          description: The requested forum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/forums/{forum_id}/topics:
    get:
      tags: [Forums]
      summary: List topics in a forum
      operationId: getTopics
      parameters:
        - $ref: '#/components/parameters/ForumShortName'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: >
            Topics in the forum, sticky topics first, then most recently
            replied-to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicListResponse'

  /json/forums/{forum_id}/topics/{slug}:
    get:
      tags: [Forums]
      summary: Get a topic by slug
      operationId: getTopic
      parameters:
        - $ref: '#/components/parameters/ForumShortName'
        - name: slug
          in: path
          required: true
          description: Topic slug.
          schema:
            type: string
      responses:
        '200':
          description: The requested topic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /json/forums/{forum_id}/topics/{topic_id}/posts:
    get:
      tags: [Forums]
      summary: List posts in a topic
      description: Returns posts in fixed pages of 25, ordered by topic position.
      operationId: getTopicPosts
      parameters:
        - $ref: '#/components/parameters/ForumShortName'
        - $ref: '#/components/parameters/TopicSlug'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Posts in the topic. `total` is the topic's post count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSearchResponse'

  /json/forums/{forum_id}/topics/{topic_id}/posts/{id}:
    get:
      tags: [Forums]
      summary: Get a post in a topic
      operationId: getTopicPost
      parameters:
        - $ref: '#/components/parameters/ForumShortName'
        - $ref: '#/components/parameters/TopicSlug'
        - name: id
          in: path
          required: true
          description: Numeric post ID.
          schema:
            type: integer
      responses:
        '200':
          description: The requested post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /rss/watched:
    get:
      tags: [RSS]
      summary: RSS feed of watched images
      description: >
        Returns an RSS feed of the authenticated user's watched images
        (equivalent to the `my:watched` search).
      operationId: getWatchedRss
      security:
        - ApiKey: []
      parameters:
        - $ref: '#/components/parameters/Key'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: RSS 2.0 feed of watched images.
          content:
            application/rss+xml:
              schema:
                type: string
        '403':
          description: No valid API key was provided.

components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: query
      name: key
      description: User API key, found on the user's account page.

  parameters:
    Key:
      name: key
      in: query
      required: false
      description: >
        An optional authentication token. If omitted, no user will be
        authenticated. You can find your authentication token in your account
        settings.
      schema:
        type: string
    FilterId:
      name: filter_id
      in: query
      required: false
      description: >
        Assuming the user can access the filter ID given by the parameter,
        overrides the current filter for this request. This is primarily
        useful for unauthenticated API access.
      schema:
        type: integer
    Page:
      name: page
      in: query
      required: false
      description: >
        Controls the current page of the response, if the response is
        paginated. Empty values default to the first page.
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      description: >
        Controls the number of results per page, up to a limit of 50, if the
        response is paginated. The default is 25.
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 25
    SearchQuery:
      name: q
      in: query
      required: true
      description: >
        The current search query, in the site's search syntax (e.g.
        `safe, first_seen_at.gt:3 days ago`).
      schema:
        type: string
    SortField:
      name: sf
      in: query
      required: false
      description: |
        The current sort field. One of the listed fields, or one of the
        parameterized sorts `random`, `random:<seed>`, or `gallery_id:<id>`,
        or `_score` for relevance.
      schema:
        type: string
        enum:
          - id
          - updated_at
          - first_seen_at
          - aspect_ratio
          - faves
          - downvotes
          - upvotes
          - width
          - height
          - score
          - comment_count
          - tag_count
          - wilson_score
          - pixels
          - size
          - duration
          - hides
          - _score
          - random
    SortDirection:
      name: sd
      in: query
      required: false
      description: The current sort direction.
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    ForumShortName:
      name: forum_id
      in: path
      required: true
      description: Forum short name (e.g. `dis`).
      schema:
        type: string
    ForumShortNameAsId:
      name: short_name
      in: path
      required: true
      description: Forum short name (e.g. `dis`).
      schema:
        type: string
    TopicSlug:
      name: topic_id
      in: path
      required: true
      description: Topic slug.
      schema:
        type: string

  responses:
    NotFound:
      description: The requested resource does not exist or is not visible.
    SearchError:
      description: The search query could not be parsed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchError'

  schemas:
    Image:
      type: object
      description: |
        An image. For images deleted from the site (`hidden_from_users` is
        `true`), only `id`, `created_at`, `updated_at`, `first_seen_at`,
        `duplicate_of`, `deletion_reason`, and `hidden_from_users` are
        returned.
      properties:
        id:
          type: integer
          description: The image's ID.
        created_at:
          type: string
          format: date-time
          description: The creation time, in UTC, of the image.
        updated_at:
          type: string
          format: date-time
          description: The time, in UTC, the image was last updated.
        first_seen_at:
          type: string
          format: date-time
          description: >
            The time, in UTC, the image was first seen (before any duplicate
            merging).
        width:
          type: integer
          description: The image's width, in pixels.
        height:
          type: integer
          description: The image's height, in pixels.
        mime_type:
          type: string
          description: The MIME type of this image.
          enum:
            - image/gif
            - image/jpeg
            - image/png
            - image/svg+xml
            - video/webm
        size:
          type: integer
          description: The number of bytes the image's file contains.
        orig_size:
          type: integer
          description: The number of bytes the originally uploaded file contained.
        duration:
          type: number
          description: The number of seconds the image lasts, if animated.
        animated:
          type: boolean
          description: Whether the image is animated.
        format:
          type: string
          description: The file extension of the image.
          enum: [gif, jpg, jpeg, png, svg, webm]
        aspect_ratio:
          type: number
          description: The image's width divided by its height.
        name:
          type: string
          description: The filename that the image was uploaded with.
        sha512_hash:
          type: string
          description: The SHA512 hash of this image after it has been processed.
        orig_sha512_hash:
          type: [string, 'null']
          description: The SHA512 hash of the image as it was originally uploaded.
        tags:
          type: array
          description: A list of tag names the image contains.
          items:
            type: string
        tag_ids:
          type: array
          description: A list of tag IDs the image contains.
          items:
            type: integer
        uploader:
          type: [string, 'null']
          description: The image's uploader. `null` if uploaded anonymously.
        uploader_id:
          type: [integer, 'null']
          description: >
            The ID of the image's uploader. `null` if uploaded anonymously.
        wilson_score:
          type: number
          description: >
            The lower bound of the
            [Wilson score interval](https://en.wikipedia.org/wiki/Binomial_proportion_confidence_interval#Wilson_score_interval)
            for the image, based on its upvotes and downvotes, given a z-score
            corresponding to a confidence of 99.5%.
        intensities:
          description: >
            Optional object of internal image intensity data for deduplication
            purposes. May be `null` if intensities have not yet been generated.
          oneOf:
            - $ref: '#/components/schemas/Intensities'
            - type: 'null'
        score:
          type: integer
          description: >
            The image's number of upvotes minus the image's number of
            downvotes.
        upvotes:
          type: integer
          description: The image's number of upvotes.
        downvotes:
          type: integer
          description: The number of downvotes the image has.
        faves:
          type: integer
          description: The number of faves the image has.
        hides:
          type: integer
          description: The number of users who have hidden the image.
        comment_count:
          type: integer
          description: The number of comments made on the image.
        tag_count:
          type: integer
          description: The number of tags present on the image.
        description:
          type: string
          description: The image's description.
        source_url:
          type: string
          deprecated: true
          description: >
            (Deprecated — use the `source_urls` field instead) Provides the
            first source URL of the image as stored in the database, intended
            for legacy applications only.
        source_urls:
          type: array
          description: >
            A list of all source URLs provided for the image, may be empty.
          items:
            type: string
        view_url:
          type: string
          format: uri
          description: The image's view URL, including tags.
        representations:
          $ref: '#/components/schemas/Representations'
        thumbnails_generated:
          type: boolean
          description: >
            Whether the image has finished thumbnail generation. Do not
            attempt to load images from `view_url` or `representations` if
            this is false.
        processed:
          type: boolean
          description: Whether the image has finished optimization.
        deletion_reason:
          type: [string, 'null']
          description: >
            The hide reason for the image, or `null` if none provided. This
            will only have a value on images which are deleted for a rule
            violation.
        duplicate_of:
          type: [integer, 'null']
          description: >
            The ID of the target image, or `null` if none provided. This will
            only have a value on images which are merged into another image.
        hidden_from_users:
          type: boolean
          description: >
            Whether the image is hidden. An image is hidden if it is merged or
            deleted for a rule violation.
        spoilered:
          type: boolean
          description: >
            Whether the image is hit by the current filter. Only present on
            single-image responses.
      required:
        - id
        - created_at
        - updated_at
        - first_seen_at
        - hidden_from_users

    Intensities:
      type: object
      description: >
        Average color intensities of the image's four corner quadrants, used
        for reverse image search.
      properties:
        nw:
          type: number
        ne:
          type: number
        sw:
          type: number
        se:
          type: number
      required: [nw, ne, sw, se]

    Representations:
      type: object
      description: >
        A mapping of representation names to their respective URLs. Contains
        the keys `"full", "large", "medium", "small", "tall", "thumb",
        "thumb_small", "thumb_tiny"`. A size is only downscaled if the image
        is larger than it; otherwise the URL points at the full image. For GIF
        images, `webm` and `mp4` video versions are also included.
      properties:
        full:
          type: string
          format: uri
        tall:
          type: string
          format: uri
          description: At most 1024x4096.
        large:
          type: string
          format: uri
          description: At most 1280x1024.
        medium:
          type: string
          format: uri
          description: At most 800x600.
        small:
          type: string
          format: uri
          description: At most 320x240.
        thumb:
          type: string
          format: uri
          description: At most 250x250.
        thumb_small:
          type: string
          format: uri
          description: At most 150x150.
        thumb_tiny:
          type: string
          format: uri
          description: At most 50x50.
        webm:
          type: string
          format: uri
          description: WebM video version. GIF images only.
        mp4:
          type: string
          format: uri
          description: MP4 video version. GIF images only.
      required:
        - tall
        - large
        - medium
        - small
        - thumb
        - thumb_small
        - thumb_tiny

    Interaction:
      type: object
      description: >
        An interaction (vote, favorite, or hide) the authenticated user has
        with an image in the response.
      properties:
        image_id:
          type: integer
        user_id:
          type: integer
        interaction_type:
          type: string
          enum: [voted, faved, hidden]
        value:
          type: string
          description: '`up` or `down` for votes; empty string otherwise.'
          enum: ['up', 'down', '']
      required: [image_id, user_id, interaction_type, value]

    ImageResponse:
      type: object
      properties:
        image:
          $ref: '#/components/schemas/Image'
        interactions:
          type: array
          description: >
            The authenticated user's interactions with the image. Empty for
            anonymous requests.
          items:
            $ref: '#/components/schemas/Interaction'
      required: [image, interactions]

    ImageSearchResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        interactions:
          type: array
          description: >
            The authenticated user's interactions with the returned images.
            Empty for anonymous requests.
          items:
            $ref: '#/components/schemas/Interaction'
        total:
          type: integer
          description: Total number of images matching the query.
      required: [images, interactions, total]

    ImageUploadRequest:
      type: object
      description: >
        Image upload payload. Provide the file either via the top-level `url`
        parameter (scraped by the server) or as a multipart upload.
      properties:
        image:
          type: object
          properties:
            description:
              type: string
              maxLength: 50000
              description: Image description, in Markdown.
            tag_input:
              type: string
              description: >
                Comma-separated list of tags. At least three tags are
                required, including a rating tag.
            source_url:
              type: string
              format: uri
              description: Source URL of the image. Must start with `http://` or `https://`.
            anonymous:
              type: boolean
              description: Whether to post the image anonymously.
          required: [tag_input]
        url:
          type: string
          format: uri
          description: >
            The direct link to the image to fetch. May be given here in the
            request body instead of as a query parameter.
      required: [image]

    ImageUploadMultipartRequest:
      type: object
      description: Multipart form variant of the image upload payload.
      properties:
        image[image]:
          type: string
          format: binary
          description: The image file. Omit when using the `url` parameter.
        image[description]:
          type: string
        image[tag_input]:
          type: string
        image[source_url]:
          type: string
        image[anonymous]:
          type: boolean

    Tag:
      type: object
      properties:
        id:
          type: integer
          description: The tag's ID.
        name:
          type: string
          description: The name of the tag.
        slug:
          type: string
          description: The slug for the tag.
        description:
          type: string
          description: The long description for the tag.
        short_description:
          type: [string, 'null']
          description: The short description for the tag.
        images:
          type: integer
          description: The image count of the tag.
        spoiler_image_uri:
          type: [string, 'null']
          format: uri
          description: The spoiler image for the tag.
        namespace:
          type: [string, 'null']
          description: The namespace of the tag.
        name_in_namespace:
          type: [string, 'null']
          description: The name of the tag in its namespace.
        category:
          type: [string, 'null']
          description: The category class of this tag.
          enum:
            - character
            - content-fanmade
            - content-official
            - error
            - oc
            - origin
            - rating
            - species
            - spoiler
        aliased_tag:
          type: [string, 'null']
          description: The slug of the tag this tag is aliased to, if any.
        aliases:
          type: array
          description: The slugs of the tags aliased to this tag.
          items:
            type: string
        implied_tags:
          type: array
          description: The slugs of the tags this tag implies.
          items:
            type: string
        implied_by_tags:
          type: array
          description: The slugs of the tags this tag is implied by.
          items:
            type: string
        dnp_entries:
          type: array
          description: >
            An array of objects containing DNP (do-not-post) entries claimed
            on the tag.
          items:
            $ref: '#/components/schemas/DnpEntry'
      required:
        - id
        - name
        - slug
        - description
        - images
        - aliases
        - implied_tags
        - implied_by_tags
        - dnp_entries

    DnpEntry:
      type: object
      description: A do-not-post list entry.
      properties:
        id:
          type: integer
        dnp_type:
          type: string
          description: The type of DNP restriction.
        conditions:
          type: string
          description: Conditions attached to the restriction.
        reason:
          type: [string, 'null']
          description: Reason for the restriction, if not hidden.
        created_at:
          type: string
          format: date-time
      required: [id, dnp_type, conditions, created_at]

    TagResponse:
      type: object
      properties:
        tag:
          $ref: '#/components/schemas/Tag'
      required: [tag]

    TagSearchResponse:
      type: object
      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        total:
          type: integer
          description: Total number of tags matching the query.
      required: [tags, total]

    Comment:
      type: object
      description: |
        A comment on an image. If the comment or its image has been deleted,
        content fields are returned as null.
      properties:
        id:
          type: integer
          description: The comment's ID.
        image_id:
          type: integer
          description: The ID of the image the comment belongs to.
        user_id:
          type: [integer, 'null']
          description: >
            The ID of the user the comment belongs to, if any. `null` if
            posted anonymously.
        author:
          type: [string, 'null']
          description: The comment's author.
        avatar:
          type: string
          description: >
            The URL of the author's avatar. May be a link to the CDN path, or
            a `data:` URI.
        body:
          type: [string, 'null']
          description: The comment text.
        created_at:
          type: [string, 'null']
          format: date-time
          description: The creation time, in UTC, of the comment.
        updated_at:
          type: [string, 'null']
          format: date-time
          description: The time, in UTC, the comment was last updated at.
        edited_at:
          type: [string, 'null']
          format: date-time
          description: >
            The time, in UTC, this comment was last edited at, or `null` if it
            was not edited.
        edit_reason:
          type: [string, 'null']
          description: >
            The edit reason for this comment, or `null` if none provided.
      required: [id, image_id]

    CommentResponse:
      type: object
      properties:
        comment:
          $ref: '#/components/schemas/Comment'
      required: [comment]

    CommentSearchResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        total:
          type: integer
          description: Total number of comments matching the query.
      required: [comments, total]

    Post:
      type: object
      description: |
        A forum post. If the post or its topic has been deleted, content
        fields are returned as null.
      properties:
        id:
          type: integer
          description: The post's ID (used to identify it).
        user_id:
          type: [integer, 'null']
          description: >
            The ID of the user the post belongs to, if any. `null` if posted
            anonymously.
        author:
          type: [string, 'null']
          description: The post's author.
        avatar:
          type: string
          description: >
            The URL of the author's avatar. May be a link to the CDN path, or
            a `data:` URI.
        body:
          type: [string, 'null']
          description: The post text.
        created_at:
          type: [string, 'null']
          format: date-time
          description: The creation time, in UTC, of the post.
        updated_at:
          type: [string, 'null']
          format: date-time
          description: The time, in UTC, the post was last updated at.
        edited_at:
          type: [string, 'null']
          format: date-time
          description: >
            The time, in UTC, this post was last edited at, or `null` if it
            was not edited.
        edit_reason:
          type: [string, 'null']
          description: The edit reason for this post.
      required: [id]

    PostResponse:
      type: object
      properties:
        post:
          $ref: '#/components/schemas/Post'
      required: [post]

    PostSearchResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        total:
          type: integer
          description: Total number of posts.
      required: [posts, total]

    Filter:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the filter.
        name:
          type: string
          description: The name of the filter.
        description:
          type: string
          description: The description of the filter.
        public:
          type: boolean
          description: >
            If `true`, is a public filter. Public filters are usable by
            anyone.
        system:
          type: boolean
          description: >
            If `true`, is a system filter. System filters are usable by anyone
            and don't have a `user_id` set.
        user_count:
          type: integer
          description: The amount of users employing this filter.
        user_id:
          type: [integer, 'null']
          description: >
            The ID of the user the filter belongs to. `null` if it isn't
            assigned to a user (usually `system` filters only).
        hidden_tag_ids:
          type: array
          description: >
            A list of tag IDs (as integers) that this filter will hide.
          items:
            type: integer
        spoilered_tag_ids:
          type: array
          description: >
            A list of tag IDs (as integers) that this filter will spoil.
          items:
            type: integer
        hidden_complex:
          type: [string, 'null']
          description: The complex hidden filter.
        spoilered_complex:
          type: [string, 'null']
          description: The complex spoiled filter.
      required:
        - id
        - name
        - description
        - public
        - system
        - user_count
        - hidden_tag_ids
        - spoilered_tag_ids

    FilterResponse:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/Filter'
      required: [filter]

    FilterListResponse:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
        total:
          type: integer
          description: Total number of filters.
      required: [filters, total]

    Gallery:
      type: object
      properties:
        id:
          type: integer
          description: The gallery's ID.
        title:
          type: string
          description: The gallery's title.
        thumbnail_id:
          type: integer
          description: The ID of the cover image for the gallery.
        spoiler_warning:
          type: string
          description: The gallery's spoiler warning.
        description:
          type: string
          description: The gallery's description.
        creator:
          type: [string, 'null']
          description: The name of the gallery's creator.
        creator_id:
          type: [integer, 'null']
          description: The ID of the gallery's creator.
      required: [id, title, thumbnail_id]

    GallerySearchResponse:
      type: object
      properties:
        galleries:
          type: array
          items:
            $ref: '#/components/schemas/Gallery'
        total:
          type: integer
          description: Total number of galleries matching the query.
      required: [galleries, total]

    Forum:
      type: object
      properties:
        name:
          type: string
          description: The forum's name.
        short_name:
          type: string
          description: The forum's short name (used to identify it).
        description:
          type: string
          description: The forum's description.
        topic_count:
          type: integer
          description: The amount of topics in the forum.
        post_count:
          type: integer
          description: The amount of posts in the forum.
      required: [name, short_name, description, topic_count, post_count]

    ForumResponse:
      type: object
      properties:
        forum:
          $ref: '#/components/schemas/Forum'
      required: [forum]

    ForumListResponse:
      type: object
      properties:
        forums:
          type: array
          items:
            $ref: '#/components/schemas/Forum'
        total:
          type: integer
          description: Total number of forums.
      required: [forums, total]

    Topic:
      type: object
      properties:
        slug:
          type: string
          description: The topic's slug (used to identify it).
        title:
          type: string
          description: The topic's title.
        post_count:
          type: integer
          description: The amount of posts in the topic.
        view_count:
          type: integer
          description: The amount of views the topic has received.
        sticky:
          type: boolean
          description: Whether the topic is sticky.
        last_replied_to_at:
          type: [string, 'null']
          format: date-time
          description: The time, in UTC, when the last reply was made.
        locked:
          type: boolean
          description: Whether the topic is locked.
        user_id:
          type: [integer, 'null']
          description: >
            The ID of the user who made the topic. `null` if posted
            anonymously.
        author:
          type: string
          description: The name of the user who made the topic.
      required: [slug, title, post_count, view_count, sticky, locked, author]

    TopicResponse:
      type: object
      properties:
        topic:
          $ref: '#/components/schemas/Topic'
      required: [topic]

    TopicListResponse:
      type: object
      properties:
        topics:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
        total:
          type: integer
          description: Total number of topics in the forum.
      required: [topics, total]

    Profile:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the user.
        name:
          type: string
          description: The name of the user.
        slug:
          type: string
          description: The slug of the user.
        role:
          type: string
          description: The role of the user.
          enum: [user, assistant, moderator, admin]
        description:
          type: [string, 'null']
          description: The description (bio) of the user.
        avatar_url:
          type: [string, 'null']
          format: uri
          description: >
            The URL of the user's thumbnail. `null` if the avatar is not set.
        created_at:
          type: string
          format: date-time
          description: The creation time, in UTC, of the user.
        comments_count:
          type: integer
          description: The comment count of the user.
        uploads_count:
          type: integer
          description: The upload count of the user.
        posts_count:
          type: integer
          description: The forum posts count of the user.
        topics_count:
          type: integer
          description: The forum topics count of the user.
        links:
          type: array
          description: The (public) links the user has registered.
          items:
            $ref: '#/components/schemas/ArtistLink'
        awards:
          type: array
          description: The awards/badges of the user.
          items:
            $ref: '#/components/schemas/Award'
      required:
        - id
        - name
        - slug
        - role
        - created_at
        - comments_count
        - uploads_count
        - posts_count
        - topics_count
        - links
        - awards

    ArtistLink:
      type: object
      description: A verified link between a user and an artist tag.
      properties:
        user_id:
          type: integer
          description: The ID of the user who owns this link.
        created_at:
          type: string
          format: date-time
          description: The creation time, in UTC, of this link.
        state:
          type: string
          description: The state of this link.
          enum: [unverified, link_verified, contacted, verified, rejected]
        tag_id:
          type: [integer, 'null']
          description: >
            The ID of an associated tag for this link. `null` if no tag
            linked.
      required: [user_id, created_at, state]

    Award:
      type: object
      description: A badge awarded to a user.
      properties:
        id:
          type: integer
          description: The ID of the badge this award is derived from.
        title:
          type: string
          description: The title of this award.
        image_url:
          type: string
          format: uri
          description: The URL of this award.
        label:
          type: [string, 'null']
          description: The label of this award.
        awarded_on:
          type: string
          format: date-time
          description: The time, in UTC, when this award was given.
      required: [id, title, image_url, awarded_on]

    ProfileResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/Profile'
      required: [user]

    Oembed:
      type: object
      description: oEmbed 1.0 photo response for an image.
      properties:
        type:
          type: string
          description: Always `"photo"`.
          enum: [photo]
        version:
          type: string
          description: Always `"1.0"`.
          enum: ['1.0']
        title:
          type: string
          description: >
            The image's ID and associated tags, as would be given on the title
            of the image page.
        author_name:
          type: string
          description: The comma-delimited names of the image authors.
        author_url:
          type: string
          description: The source URL of the image.
        provider_name:
          type: string
          description: The site's name (e.g. `"Derpibooru"`).
        provider_url:
          type: string
          format: uri
          description: The site's URL (e.g. `"https://derpibooru.org"`).
        cache_age:
          type: integer
          description: Always `7200`.
        thumbnail_url:
          type: string
          format: uri
        thumbnail_width:
          type: integer
        thumbnail_height:
          type: integer
        url:
          type: string
          format: uri
          description: URL of the full-size image file.
        width:
          type: integer
        height:
          type: integer
        derpibooru_id:
          type: integer
          description: The image's ID.
        derpibooru_score:
          type: integer
          description: >
            The image's number of upvotes minus the image's number of
            downvotes.
        derpibooru_comments:
          type: integer
          description: The number of comments made on the image.
        derpibooru_tags:
          type: array
          description: The names of the image's tags.
          items:
            type: string
      required:
        - type
        - version
        - title
        - provider_name
        - provider_url
        - url
        - width
        - height

    OembedError:
      type: object
      properties:
        error:
          type: string
          examples:
            - Couldn't find an image
      required: [error]

    SearchError:
      type: object
      properties:
        error:
          type: string
          description: Description of the query parse error.
      required: [error]

    ValidationErrors:
      type: object
      properties:
        errors:
          type: object
          description: >
            Map of field names to lists of validation error messages. Each
            field is optional and is an array of strings.
          properties:
            image:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            image_aspect_ratio:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            image_format:
              type: array
              description: When an image is unsupported (e.g. WEBP).
              items:
                type: string
            image_height:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            image_width:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            image_size:
              type: array
              description: Usually if an image that is too large is uploaded.
              items:
                type: string
            image_is_animated:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            image_mime_type:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            image_orig_sha512_hash:
              type: array
              description: >
                Errors in the submitted image. If *has already been taken* is
                present, the image already exists in the database.
              items:
                type: string
            image_sha512_hash:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
            tag_input:
              type: array
              description: Errors with the tag metadata.
              items:
                type: string
            uploaded_image:
              type: array
              description: Errors in the submitted image.
              items:
                type: string
          additionalProperties:
            type: array
            items:
              type: string
      required: [errors]
